version: '3.8'

# VoxPEP — Production-like Environment
# Usage: docker compose -f infra/docker-compose.prod.yml up -d
# Requires: .env file in project root with production secrets

services:
  postgres:
    image: postgres:16-alpine
    container_name: voxpep-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-voxpep}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-voxpep}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-voxpep}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: voxpep-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/var/lib/redis/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: voxpep-api
    ports:
      - '3000:3000'
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: voxpep-web
    ports:
      - '80:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
