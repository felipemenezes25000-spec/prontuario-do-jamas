version: '3.8'

# VoxPEP — Development Infrastructure
# Usage: docker compose -f infra/docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: voxpep-postgres
    ports:
      - '5555:5432'
    environment:
      POSTGRES_USER: voxpep
      POSTGRES_PASSWORD: voxpep
      POSTGRES_DB: voxpep
      POSTGRES_INITDB_ARGS: '--auth-host=password --auth-local=trust'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pg_hba.conf:/etc/pg_hba_custom.conf:ro
    command: postgres -c hba_file=/etc/pg_hba_custom.conf -c password_encryption=md5
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voxpep']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voxpep-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/var/lib/redis/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: voxpep-elasticsearch
    ports:
      - '9200:9200'
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  es_data:
